name: CI/CD Calculadora Java

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Instalar Dependencias e Rodar Testes
      # Executa exatamente os comandos exigidos pelo critério de avaliação
      run: |
        mvn install -DskipTests
        mvn test

    - name: Build Docker Image
      run: |
        docker build -t minha-calculadora:latest .