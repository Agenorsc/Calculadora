name: CI/CD Calculadora Java

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build e Testes Unitários
      # Aqui o GitHub roda o comando que você testou no VS Code!
      run: mvn clean test

    - name: Build Docker Image
      # Aqui ele simula a criação da imagem Docker
      run: |
        docker build -t minha-calculadora:latest .
        echo "Imagem Docker criada com sucesso!"
